[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
```

# Function routes must be matched before the SPA catch-all
[[redirects]]
  from   = "/.netlify/functions/*"
  to     = "/.netlify/functions/:splat"
  status = 200
  force  = true

# SPA catch-all: all other routes → index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
