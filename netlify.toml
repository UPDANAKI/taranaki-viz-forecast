[build]
  command = "npm run build"
  publish = "dist"

[functions]
  node_bundler = "esbuild"

[functions.score]
  included_files = [
    "netlify/functions/vizcast_model.onnx",
    "netlify/functions/vizcast_model_cols.json",
    "netlify/functions/vizcast_model_meta.json"
  ]

# Function routes must be matched before the SPA catch-all
[[redirects]]
  from   = "/.netlify/functions/*"
  to     = "/.netlify/functions/:splat"
  status = 200
  force  = true

# SPA catch-all: all other routes → index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
